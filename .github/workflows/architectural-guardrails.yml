name: Architectural Guardrails (KB + Core)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, master]
  workflow_dispatch: {}

concurrency:
  group: architectural-guardrails-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guardrails:
    name: pytest (architectural)
    runs-on: ubuntu-latest
    # Skip draft PRs (they often churn; enable once ready_for_review triggers).
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml

      - name: Run guardrails
        run: |
          pytest -q tests/architectural -m architectural

