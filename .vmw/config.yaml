agents:
  context_updater:
    enabled: true
  coordinator:
    enabled: true
  file_watcher:
    enabled: true
  health_monitor:
    enabled: true
  vital_extractor:
    enabled: true
monitoring:
  enabled: true
  ignored_patterns:
  - '*.log'
  - '*.tmp'
  - __pycache__/*
  - .git/*
  - node_modules/*
  interval_seconds: 300
  watched_files:
  - .github/copilot-instructions.md
  - docker-compose.yml
  - .env
  - pyproject.toml
  - setup.py
  - requirements.txt
  - README.md
output:
  context_file: ALWAYS_AVAILABLE_CONTEXT.md
  log_file: agent_logs.json
  vital_updates_file: VITAL_UPDATES.md
systemd:
  enabled: false
  service_name: vitruvyan-memory-warden
  user: caravaggio
version: 0.1.0
workspace: /home/caravaggio/projects/vitruvyan-core
