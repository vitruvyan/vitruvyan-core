services:
  redis:
    image: redis:7.2-alpine
    container_name: omni_redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1
    ports:
      - "9379:6379"
    volumes:
      - redis_data_omni:/data
    networks:
      - omni-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: omni_postgres
    restart: always
    environment:
      POSTGRES_DB: vitruvyan_omni_omni
      POSTGRES_USER: vitruvyan_omni_user
      POSTGRES_PASSWORD: "@Caravaggio971_omni"
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "9432:5432"
    volumes:
      - postgres_data_omni:/var/lib/postgresql/data
    networks:
      - omni-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitruvyan_omni_user -d vitruvyan_omni"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloak
    restart: always
    command:
      - start
      - --proxy=edge
      - --hostname=user.vitruvyan.com
      - --hostname-strict=false
    environment:
      KC_HOSTNAME: user.vitruvyan.com
      KC_HOSTNAME_STRICT: false
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://172.17.0.1:5432/keycloak
      KC_DB_USERNAME: vitruvyan_user
      KC_DB_PASSWORD: "@Caravaggio971"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: "@Caravaggio971"
    ports:
      - "9080:8080"
    networks:
      - omni-net

  qdrant:
    image: qdrant/qdrant:v1.15.0
    container_name: omni_qdrant
    restart: always
    ports:
      - "9333:6333"
      - "9334:6334"
    volumes:
      - qdrant_data_omni:/qdrant/storage
    networks:
      - omni-net

  # Embedding Service - MiniLM-L6-v2 API (port 8010)
  vitruvyan_api_embedding:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.api_embedding
    container_name: omni_api_embedding
    networks:
      - omni-net
    depends_on:
      - redis
      - postgres
      - qdrant
    ports:
      - "9010:8010"
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app
      - POSTGRES_HOST=${POSTGRES_HOST:-omni_postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-vitruvyan_omni}
      - POSTGRES_USER=${POSTGRES_USER:-vitruvyan_omni_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-@Caravaggio971}
      - QDRANT_URL=${QDRANT_URL_OMNI:-http://omni_qdrant:6333}
      - REDIS_URL=${REDIS_URL:-redis://omni_redis:6379}

  # DEPRECATED SERVICES (Removed from Core)
  # - vitruvyan_api_sentiment: Replaced by Babel Gardens
  # - vitruvyan_api_semantic: Deprecated and removed
  # - notion: Not core (integration-specific)

  vitruvyan_api_graph:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.api_graph
    container_name: omni_api_graph
    environment:
      - LANGGRAPH_ENABLED=0
      - DISPATCHER_URL=http://vitruvyan_api:8000/dispatch
      - DISPATCHER_HEALTH_URL=http://vitruvyan_api:8000/health
      - GRAPH_HTTP_TIMEOUT=120
      - POSTGRES_HOST=${POSTGRES_HOST_OMNI:-omni_postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB_OMNI:-vitruvyan_omni}
      - POSTGRES_USER=${POSTGRES_USER_OMNI:-vitruvyan_omni_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD_OMNI:-@Caravaggio971_omni}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GRAPH_LLM_MODEL=gpt-4o-mini
      - QDRANT_HOST=${QDRANT_HOST_OMNI:-omni_qdrant}
      - QDRANT_PORT=${QDRANT_PORT_OMNI:-6333}
      - NE_BASE_URL=http://vitruvyan_api_neural:8003
      - SENTIMENT_API_URL=http://vitruvyan_babel_gardens:8009
      - EMBEDDING_API_URL=http://vitruvyan_api_embedding:8010
      - REDIS_HOST=omni_redis
      - REDIS_PORT=6379
      - LLM_CACHE_ENABLED=true
      - LLM_CACHE_TTL_HOURS=24
      - LLM_CACHE_MAX_SIZE=10000
      # VSGS (Semantic Grounding) Configuration - PR-C
      - VSGS_ENABLED=${VSGS_ENABLED:-0}
      - VSGS_GROUNDING_TOPK=${VSGS_GROUNDING_TOPK:-3}
      - VSGS_PROMPT_BUDGET_CHARS=${VSGS_PROMPT_BUDGET_CHARS:-800}
      - VSGS_STORE_EVERY_N=${VSGS_STORE_EVERY_N:-1}
    ports:
      - "9004:8004"
    restart: unless-stopped
    depends_on:
      - redis
      - postgres
    networks:
      - omni-net

  # DEPRECATED SERVICES (Financial vertical - removed from Core)
  # - vitruvyan_api_sentiment: Replaced by Babel Gardens
  # - vitruvyan_api_semantic: Deprecated and removed
  # - vitruvyan_portfolio_guardian: Financial-specific portfolio monitoring  
  
  # 🧠 NEURAL ENGINE - Domain-Agnostic Ranking Service
  vitruvyan_api_neural:
    build:
      context: ../..
      dockerfile: services/api_neural_engine/Dockerfile
    container_name: omni_api_neural
    ports:
      - "9003:8003"
    environment:
      PYTHONPATH: /app
      LOG_LEVEL: info
      DOMAIN: mock
    restart: unless-stopped
    networks:
      - omni-net

  # 🏛️ ORTHODOXY WARDENS - Sacred Compliance & Divine Order
  vitruvyan_api_orthodoxy_wardens:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.orthodoxy_wardens
    container_name: omni_api_orthodoxy_wardens
    environment:
      PYTHONPATH: /app
      POSTGRES_HOST: ${POSTGRES_HOST_OMNI:-omni_postgres}
      POSTGRES_PORT: ${POSTGRES_PORT_OMNI:-5432}
      POSTGRES_DB: ${POSTGRES_DB_OMNI:-vitruvyan_omni}
      POSTGRES_USER: ${POSTGRES_USER_OMNI:-vitruvyan_omni_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_OMNI:-@Caravaggio971_omni}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_HOST: omni_redis
      REDIS_PORT: 6379
      QDRANT_HOST: ${QDRANT_HOST_OMNI:-omni_qdrant}
      QDRANT_PORT: ${QDRANT_PORT_OMNI:-6333}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      # Sacred Configuration
      ORTHODOXY_MONITORING_INTERVAL: 300
      DIVINE_AUTO_CORRECTION_ENABLED: "true"
      SACRED_COMPLIANCE_THRESHOLD: 0.8
      CONFESSION_AUTO_ABSOLUTION: "false"
    volumes:
      # Mount only API code for hot-reload (FASE 4: flat services/ layout)
      - ../../services/api_orthodoxy_wardens:/app/api_orthodoxy_wardens:ro
      - ../../vitruvyan_core/core:/app/core:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro  # For sacred Docker operations
    ports:
      - "9006:8006"
    restart: unless-stopped
    depends_on:
      - redis
      - qdrant
      # TEMPORARY: Commented for P1 FASE 1 testing (Feb 8, 2026)
      # - vitruvyan_api_graph
    networks:
      - omni-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/divine-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s



