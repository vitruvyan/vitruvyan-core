      - POSTGRES_HOST=${POSTGRES_HOST_OMNI:-omni_postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB_OMNI:-vitruvyan_omni}
      - POSTGRES_USER=${POSTGRES_USER_OMNI:-vitruvyan_omni_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD_OMNI:-@Caravaggio971_omni}
      # Vector DB
      - QDRANT_HOST=${QDRANT_HOST_OMNI:-omni_qdrant}
      - QDRANT_PORT=${QDRANT_PORT_OMNI:-6333}
      # Redis for Cognitive Bus
      - REDIS_HOST=omni_redis
      - REDIS_PORT=6379
      # API Configuration
      - CODEX_API_HOST=0.0.0.0
      - CODEX_API_PORT=8008
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CODEX_LOG_LEVEL=INFO
    # volumes:
    #   - .:/app:ro  # Commented out to use baked-in code with prometheus_client
    networks:
      - omni-net
    depends_on:
      - redis
      - qdrant
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  vitruvyan_pattern_weavers:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.api_weavers
    container_name: omni_pattern_weavers
    restart: unless-stopped
    ports:
      - "9017:8011"
    environment:
      - PYTHONPATH=/app
      # Database connections
      - POSTGRES_HOST=${POSTGRES_HOST_OMNI:-omni_postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB_OMNI:-vitruvyan_omni}
      - POSTGRES_USER=${POSTGRES_USER_OMNI:-vitruvyan_omni_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD_OMNI:-@Caravaggio971_omni}
      # Vector DB
      - QDRANT_HOST=${QDRANT_HOST_OMNI:-omni_qdrant}
      - QDRANT_PORT=${QDRANT_PORT_OMNI:-6333}
      # Redis for Cognitive Bus
      - REDIS_HOST=omni_redis
      - REDIS_PORT=6379
      # OpenAI for semantic operations
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - omni-net
    depends_on:
      - redis
      - qdrant
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================
  # MONITORING STACK: Prometheus + Grafana + Exporters
  # ============================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: omni_prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "15000:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    networks:
      - omni-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: omni_grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=vitruvyan_admin
      - GF_SERVER_ROOT_URL=https://dash.vitruvyan.com
      - GF_SERVER_DOMAIN=dash.vitruvyan.com
      - GF_INSTALL_PLUGINS=redis-datasource
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - omni-net
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: omni_redis_exporter
    restart: always
    environment:
      - REDIS_ADDR=omni_redis:6379
    ports:
      - "9121:9121"
    networks:
      - omni-net
    depends_on:
      - redis

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: omni_postgres_exporter
    restart: always
    environment:
      - DATA_SOURCE_NAME=postgresql://vitruvyan_user:@Caravaggio971@172.17.0.1:5432/vitruvyan?sslmode=disable
      - PG_EXPORTER_EXTEND_QUERY_PATH=/etc/postgres_exporter/queries.yml
    ports:
      - "9187:9187"
    volumes:
      - ./monitoring/postgres_exporter_queries.yml:/etc/postgres_exporter/queries.yml:ro
    networks:
      - omni-net

  node_exporter:
    image: prom/node-exporter:latest
    container_name: omni_node_exporter
    restart: always
    command:
      - '--path.rootfs=/host'
    ports:
      - "9100:9100"
    volumes:
      - /:/host:ro,rslave
    networks:
      - omni-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: omni_cadvisor
    restart: always
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    ports:
      - "9081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - omni-net

  portainer:
    image: portainer/portainer-ce:latest
    container_name: omni_portainer
    restart: always
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data_omni:/data
    networks:
      - omni-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data_omni:
  postgres_data_omni:
  qdrant_data_omni:
  babel_gardens_models:
  babel_gardens_logs:
  vault_keeper_data:
  prometheus_data:
  grafana_data:
  portainer_data_omni:

networks:
  omni-net:
    driver: bridge
    name: vitruvyan_omni_net