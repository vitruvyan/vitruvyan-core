# ============================================================================
# VITRUVYAN CORE — Docker Compose Stack
# ============================================================================
# Naming:    core_<service>
# Network:   core-net
# Ports:     9xxx (external) → 8xxx (internal)
# Volumes:   <service>_data_core
# Database:  vitruvyan_core / vitruvyan_core_user
# Portainer: vitruvyan-core stack
# ============================================================================

# Stack name (for Portainer visibility)
name: vitruvyan-core

services:

  # ══════════════════════════════════════════════════════════════════════════
  #  INFRASTRUCTURE — Redis, PostgreSQL, Qdrant, Keycloak
  # ══════════════════════════════════════════════════════════════════════════

  redis:
    image: redis:7.2-alpine
    container_name: core_redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1
    ports:
      - "9379:6379"
    volumes:
      - redis_data_core:/data
    networks:
      - core-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: core_postgres
    restart: always
    environment:
      POSTGRES_DB: vitruvyan_core
      POSTGRES_USER: vitruvyan_core_user
      POSTGRES_PASSWORD: "@Caravaggio971_core"
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "9432:5432"
    volumes:
      - postgres_data_core:/var/lib/postgresql/data
    networks:
      - core-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitruvyan_core_user -d vitruvyan_core"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.15.0
    container_name: core_qdrant
    restart: always
    ports:
      - "9333:6333"
      - "9334:6334"
    volumes:
      - qdrant_data_core:/qdrant/storage
    networks:
      - core-net

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: core_keycloak
    restart: always
    command:
      - start
      - --proxy=edge
      - --hostname=user.vitruvyan.com
      - --hostname-strict=false
    environment:
      KC_HOSTNAME: user.vitruvyan.com
      KC_HOSTNAME_STRICT: false
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://172.17.0.1:5432/keycloak
      KC_DB_USERNAME: vitruvyan_user
      KC_DB_PASSWORD: "@Caravaggio971"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: "@Caravaggio971"
    ports:
      - "9080:8080"
    networks:
      - core-net


  # ══════════════════════════════════════════════════════════════════════════
  #  ORCHESTRATION — Graph Engine, Neural Engine, Embedding
  # ══════════════════════════════════════════════════════════════════════════

  graph:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.api_graph
    container_name: core_graph
    restart: unless-stopped
    ports:
      - "9004:8004"
    environment:
      - LANGGRAPH_ENABLED=0
      - DISPATCHER_URL=http://graph:8004/dispatch
      - DISPATCHER_HEALTH_URL=http://graph:8004/health
      - GRAPH_HTTP_TIMEOUT=120
      - POSTGRES_HOST=${POSTGRES_HOST:-core_postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-vitruvyan_core}
      - POSTGRES_USER=${POSTGRES_USER:-vitruvyan_core_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-@Caravaggio971_core}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GRAPH_LLM_MODEL=gpt-4o-mini
      - QDRANT_HOST=${QDRANT_HOST:-core_qdrant}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      - NE_BASE_URL=http://neural_engine:8003
      - SENTIMENT_API_URL=http://babel_gardens:8009
      - EMBEDDING_API_URL=http://embedding:8010
      - REDIS_HOST=core_redis
      - REDIS_PORT=6379
      - LLM_CACHE_ENABLED=true
      - LLM_CACHE_TTL_HOURS=24
      - LLM_CACHE_MAX_SIZE=10000
      # VSGS (Semantic Grounding)
      - VSGS_ENABLED=${VSGS_ENABLED:-0}
      - VSGS_GROUNDING_TOPK=${VSGS_GROUNDING_TOPK:-3}
      - VSGS_PROMPT_BUDGET_CHARS=${VSGS_PROMPT_BUDGET_CHARS:-800}
      - VSGS_STORE_EVERY_N=${VSGS_STORE_EVERY_N:-1}
    depends_on:
      - redis
      - postgres
    networks:
      - core-net

  neural_engine:
    build:
      context: ../..
      dockerfile: services/api_neural_engine/Dockerfile
    container_name: core_neural_engine
    restart: unless-stopped
    ports:
      - "9003:8003"
    environment:
      PYTHONPATH: /app
      LOG_LEVEL: info
      DOMAIN: mock
    networks:
      - core-net

  mcp:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.api_mcp
    container_name: core_mcp
    restart: unless-stopped
    ports:
      - "8020:8020"
    environment:
      - PYTHONPATH=/app:/app/vitruvyan_core
      - LOG_LEVEL=${MCP_LOG_LEVEL:-INFO}
      - PORT=8020
      # PostgreSQL
      - POSTGRES_HOST=${POSTGRES_HOST:-core_postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-vitruvyan_core}
      - POSTGRES_USER=${POSTGRES_USER:-vitruvyan_core_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-@Caravaggio971_core}
      # Redis (StreamBus)
      - REDIS_HOST=core_redis
      - REDIS_PORT=6379
      # MCP Validation Config (domain-agnostic thresholds)
      - MCP_Z_THRESHOLD=${MCP_Z_THRESHOLD:-3.0}
      - MCP_COMPOSITE_THRESHOLD=${MCP_COMPOSITE_THRESHOLD:-5.0}
      - MCP_MIN_SUMMARY_WORDS=${MCP_MIN_SUMMARY_WORDS:-100}
      - MCP_MAX_SUMMARY_WORDS=${MCP_MAX_SUMMARY_WORDS:-200}
      - MCP_FACTOR_KEYS=${MCP_FACTOR_KEYS:-factor_1,factor_2,factor_3,factor_4,factor_5}
      # External APIs
      - NEURAL_ENGINE_API=http://neural_engine:8003
      - LANGGRAPH_URL=http://graph:8004
      - PATTERN_WEAVERS_API=http://pattern_weavers:8017
      # OpenAI (Function Calling)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${MCP_OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      - redis
      - postgres
      - neural_engine
      - graph
    networks:
      - core-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8020/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  embedding:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.api_embedding
    container_name: core_embedding
    restart: unless-stopped
    ports:
      - "9010:8010"
    environment:
      - PYTHONPATH=/app
      - POSTGRES_HOST=${POSTGRES_HOST:-core_postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-vitruvyan_core}
      - POSTGRES_USER=${POSTGRES_USER:-vitruvyan_core_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-@Caravaggio971_core}
      - QDRANT_URL=${QDRANT_URL:-http://core_qdrant:6333}
      - REDIS_URL=${REDIS_URL:-redis://core_redis:6379}
    depends_on:
      - redis
      - postgres
      - qdrant
    networks:
      - core-net


  # ══════════════════════════════════════════════════════════════════════════
  #  SACRED ORDERS — Orthodoxy Wardens, Vault Keepers, Synaptic Conclave
  # ══════════════════════════════════════════════════════════════════════════

  orthodoxy_wardens:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.orthodoxy_wardens
    container_name: core_orthodoxy_wardens
    restart: unless-stopped
    ports:
      - "9006:8006"
    environment:
      PYTHONPATH: /app
      POSTGRES_HOST: ${POSTGRES_HOST:-core_postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-vitruvyan_core}
      POSTGRES_USER: ${POSTGRES_USER:-vitruvyan_core_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-@Caravaggio971_core}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_HOST: core_redis
      REDIS_PORT: 6379
      QDRANT_HOST: ${QDRANT_HOST:-core_qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      # Sacred Configuration
      ORTHODOXY_MONITORING_INTERVAL: 300
      DIVINE_AUTO_CORRECTION_ENABLED: "true"
      SACRED_COMPLIANCE_THRESHOLD: 0.8
      CONFESSION_AUTO_ABSOLUTION: "false"
    volumes:
      - ../../services/api_orthodoxy_wardens:/app/api_orthodoxy_wardens:ro
      - ../../vitruvyan_core/core:/app/core:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - redis
      - qdrant
    networks:
      - core-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  vault_keepers:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.vault_keepers
    container_name: core_vault_keepers
    restart: unless-stopped
    ports:
      - "9007:8007"
    environment:
      - PYTHONPATH=/app
      # Database
      - POSTGRES_HOST=${POSTGRES_HOST:-core_postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-vitruvyan_core}
      - POSTGRES_USER=${POSTGRES_USER:-vitruvyan_core_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-@Caravaggio971_core}
      # Vector DB
      - QDRANT_HOST=${QDRANT_HOST:-core_qdrant}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      # Redis (Cognitive Bus)
      - REDIS_HOST=core_redis
      - REDIS_PORT=6379
      # API
      - VAULT_API_HOST=0.0.0.0
      - VAULT_API_PORT=8007
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VAULT_LOG_LEVEL=INFO
      # Backup
      - BACKUP_MODE=auto
      - BACKUP_STORAGE=/var/vitruvyan/vaults
      - BACKUP_INTERVAL_MINUTES=30
      # Google Drive Backup
      - GDRIVE_ENABLED=true
      - GDRIVE_USE_OAUTH=true
      - GDRIVE_FOLDER_ID=1fSFXHXSKKEmTMPZlaYdvjaSNQ6iChIpb
      - GDRIVE_TOKEN_PATH=/app/secrets/token.json
      - GDRIVE_SERVICE_ACCOUNT_PATH=/app/secrets/gdrive-service-account.json
      - GDRIVE_BACKUP_MODE=incremental
      - GDRIVE_AUTO_DELETE_LOCAL=true
      - GDRIVE_KEEP_COUNT=30
    volumes:
      - ../../services/api_vault_keepers:/app/api_vault_keepers:ro
      - ../../vitruvyan_core/core:/app/core:ro
      - vault_keeper_data:/var/vitruvyan/vaults
      - ../../infrastructure/secrets:/app/secrets:ro
    depends_on:
      - redis
      - qdrant
    networks:
      - core-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  conclave:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.api_conclave
    container_name: core_conclave
    restart: unless-stopped
    ports:
      - "9012:8012"
    environment:
      # Redis (Cognitive Bus)
      - REDIS_URL=redis://core_redis:6379/0
      - REDIS_HOST=core_redis
      - CONCLAVE_PORT=8012
      # Database
      - POSTGRES_HOST=${POSTGRES_HOST:-core_postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      # Sacred Order endpoints
      - BABEL_GARDENS_URL=http://babel_gardens:8009
      - MEMORY_ORDERS_URL=http://memory_orders:8016
      - ORTHODOXY_WARDENS_URL=http://orthodoxy_wardens:8006
      - VAULT_KEEPERS_URL=http://vault_keepers:8007
      - NEURAL_ENGINE_URL=http://neural_engine:8003
      - SENTIMENT_API_URL=http://babel_gardens:8009
      - GRAPH_ORCHESTRATOR_URL=http://graph:8004
      # Conclave config
      - CONCLAVE_HOST=0.0.0.0
      - PULSE_INTERVAL=30
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs/conclave:/app/logs/conclave
    depends_on:
      - redis
      - babel_gardens
    networks:
      - core-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/health"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 30s


  # ══════════════════════════════════════════════════════════════════════════
  #  COGNITIVE SERVICES — Babel Gardens, Memory Orders, Codex, Weavers
  # ══════════════════════════════════════════════════════════════════════════

  babel_gardens:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.api_babel_gardens
    container_name: core_babel_gardens
    restart: unless-stopped
    ports:
      - "9009:8009"
    environment:
      # Redis (Cognitive Bus)
      - REDIS_URL=redis://core_redis:6379/0
      - REDIS_HOST=core_redis
      - REDIS_PORT=6379
      # Database
      - POSTGRES_HOST=${POSTGRES_HOST:-core_postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-vitruvyan_core}
      - POSTGRES_USER=${POSTGRES_USER:-vitruvyan_core_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-@Caravaggio971_core}
      - QDRANT_URL=${QDRANT_URL:-http://core_qdrant:6333}
      # Service URLs
      - NEURAL_ENGINE_URL=http://neural_engine:8003
      # Model config
      - HUGGINGFACE_HUB_CACHE=/app/models
      - TRANSFORMERS_CACHE=/app/models
      - TORCH_HOME=/app/models
      - HUGGINGFACE_HUB_TOKEN=${HUGGINGFACE_HUB_TOKEN}
      # Performance
      - CUDA_VISIBLE_DEVICES=
      - OMP_NUM_THREADS=4
      - TOKENIZERS_PARALLELISM=false
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    volumes:
      - babel_gardens_models:/app/models
      - babel_gardens_logs:/app/logs
    depends_on:
      - redis
      - postgres
      - qdrant
    networks:
      - core-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  memory_orders:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.api_memory_orders
    container_name: core_memory_orders
    restart: unless-stopped
    ports:
      - "9016:8016"
    environment:
      # Redis (Cognitive Bus)
      - REDIS_URL=redis://core_redis:6379/0
      - REDIS_HOST=core_redis
      - REDIS_PORT=6379
      # Database (Archivarium)
      - POSTGRES_HOST=${POSTGRES_HOST:-core_postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-vitruvyan_core}
      - POSTGRES_USER=${POSTGRES_USER:-vitruvyan_core_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-@Caravaggio971_core}
      # Vector DB (Mnemosyne)
      - QDRANT_HOST=${QDRANT_HOST:-core_qdrant}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      - QDRANT_URL=${QDRANT_URL:-http://core_qdrant:6333}
      # Embedding Service
      - EMBEDDING_SERVICE_URL=http://embedding:8010/embed
      # Memory config
      - MEMORY_API_HOST=0.0.0.0
      - MEMORY_API_PORT=8016
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      # Performance
      - MEMORY_WRITE_TIMEOUT=5.0
      - MEMORY_READ_TIMEOUT=3.0
      - MEMORY_VECTOR_TIMEOUT=8.0
      - DUAL_MEMORY_COHERENCE_CHECK=true
    volumes:
      - ../../services/api_memory_orders:/app/api_memory_orders:ro
      - ../../vitruvyan_core/core/foundation/semantic_sync:/app/core/foundation/semantic_sync:ro
      - ../../vitruvyan_core/core/foundation/persistence:/app/core/foundation/persistence:ro
      - ../../vitruvyan_core/core/foundation/cognitive_bus:/app/core/foundation/cognitive_bus:ro
      - ./logs/memory_orders:/app/logs/memory_orders
    depends_on:
      - redis
      - qdrant
      - embedding
      - babel_gardens
    networks:
      - core-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8016/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  memory_orders_listener:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.api_memory_orders
    container_name: core_memory_orders_listener
    restart: unless-stopped
    environment:
      # Redis (Cognitive Bus)
      - REDIS_HOST=core_redis
      - REDIS_PORT=6379
      # Database (Archivarium)
      - POSTGRES_HOST=${POSTGRES_HOST:-core_postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-vitruvyan_core}
      - POSTGRES_USER=${POSTGRES_USER:-vitruvyan_core_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-@Caravaggio971_core}
      # Vector DB (Mnemosyne)
      - QDRANT_HOST=${QDRANT_HOST:-core_qdrant}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      - QDRANT_URL=${QDRANT_URL:-http://core_qdrant:6333}
      # Embedding Service
      - EMBEDDING_SERVICE_URL=http://embedding:8010/embed
      # Babel Gardens
      - BABEL_GARDENS_URL=http://babel_gardens:8006
      # Config
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - MEMORY_LISTENER_ENABLED=1
    volumes:
      - ../../services/api_memory_orders:/app/api_memory_orders:ro
      - ../../vitruvyan_core/core:/app/core:ro
      - ./logs/memory_orders_listener:/app/logs
    depends_on:
      - redis
      - memory_orders
      - babel_gardens
    networks:
      - core-net
    command: ["python3", "/app/api_memory_orders/streams_listener.py"]

  codex_hunters:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.api_codex_hunters
    container_name: core_codex_hunters
    restart: unless-stopped
    ports:
      - "9008:8008"
    environment:
      - PYTHONPATH=/app
      # Database
      - POSTGRES_HOST=${POSTGRES_HOST:-core_postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-vitruvyan_core}
      - POSTGRES_USER=${POSTGRES_USER:-vitruvyan_core_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-@Caravaggio971_core}
      # Vector DB
      - QDRANT_HOST=${QDRANT_HOST:-core_qdrant}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      # Redis (Cognitive Bus)
      - REDIS_HOST=core_redis
      - REDIS_PORT=6379
      # API
      - CODEX_API_HOST=0.0.0.0
      - CODEX_API_PORT=8008
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CODEX_LOG_LEVEL=INFO
    depends_on:
      - redis
      - qdrant
    networks:
      - core-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  pattern_weavers:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.api_weavers
    container_name: core_pattern_weavers
    restart: unless-stopped
    ports:
      - "9017:8011"
    environment:
      - PYTHONPATH=/app:/app/vitruvyan_core
      # Database
      - POSTGRES_HOST=${POSTGRES_HOST:-core_postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-vitruvyan_core}
      - POSTGRES_USER=${POSTGRES_USER:-vitruvyan_core_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-@Caravaggio971_core}
      # Vector DB
      - QDRANT_HOST=${QDRANT_HOST:-core_qdrant}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      # Redis (Cognitive Bus)
      - REDIS_HOST=core_redis
      - REDIS_PORT=6379
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - redis
      - qdrant
    networks:
      - core-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s


  # ══════════════════════════════════════════════════════════════════════════
  #  LISTENERS — Redis Streams Consumers (one per Sacred Order / Service)
  # ══════════════════════════════════════════════════════════════════════════

  conclave_listener:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.api_conclave
    container_name: core_conclave_listener
    restart: unless-stopped
    environment:
      - REDIS_HOST=core_redis
      - REDIS_PORT=6379
      - CONCLAVE_LISTENER_ENABLED=1
    volumes:
      - ./logs/conclave_listener:/app/logs
    depends_on:
      - redis
      - conclave
    networks:
      - core-net
    command: ["python3", "/app/api_conclave/streams_listener.py"]

  orthodoxy_listener:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.orthodoxy_wardens
    container_name: core_orthodoxy_listener
    restart: unless-stopped
    environment:
      - REDIS_HOST=core_redis
      - REDIS_PORT=6379
      - ORTHODOXY_LISTENER_ENABLED=1
    volumes:
      - ./logs/orthodoxy_listener:/app/logs
    depends_on:
      - redis
      - orthodoxy_wardens
    networks:
      - core-net
    command: ["python3", "/app/api_orthodoxy_wardens/streams_listener.py"]

  vault_listener:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.vault_keepers
    container_name: core_vault_listener
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app
      - REDIS_HOST=core_redis
      - REDIS_PORT=6379
      - VAULT_LISTENER_ENABLED=1
      # Database (local container)
      - POSTGRES_HOST=${POSTGRES_HOST:-core_postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-vitruvyan_core}
      - POSTGRES_USER=${POSTGRES_USER:-vitruvyan_core_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-@Caravaggio971_core}
    volumes:
      - ./logs/vault_listener:/app/logs
    depends_on:
      - redis
      - postgres
      - vault_keepers
    networks:
      - core-net
    command: ["python3", "/app/api_vault_keepers/streams_listener.py"]

  babel_listener:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.api_babel_gardens
    container_name: core_babel_listener
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app
      - REDIS_HOST=core_redis
      - REDIS_PORT=6379
      - BABEL_LISTENER_ENABLED=1
      # Database (local container)
      - POSTGRES_HOST=${POSTGRES_HOST:-core_postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-vitruvyan_core}
      - POSTGRES_USER=${POSTGRES_USER:-vitruvyan_core_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-@Caravaggio971_core}
    volumes:
      - ./logs/babel_listener:/app/logs
    depends_on:
      - redis
      - postgres
      - babel_gardens
    networks:
      - core-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import redis; r = redis.Redis(host='core_redis', port=6379); r.ping(); print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: ["python3", "/app/api_babel_gardens/streams_listener.py"]

  codex_listener:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.api_codex_hunters
    container_name: core_codex_listener
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app
      - REDIS_HOST=core_redis
      - REDIS_PORT=6379
      - CODEX_LISTENER_ENABLED=1
      # Database (local container)
      - POSTGRES_HOST=${POSTGRES_HOST:-core_postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-vitruvyan_core}
      - POSTGRES_USER=${POSTGRES_USER:-vitruvyan_core_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-@Caravaggio971_core}
    volumes:
      - ./logs/codex_listener:/app/logs
    depends_on:
      - redis
      - postgres
      - codex_hunters
    networks:
      - core-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import redis; r = redis.Redis(host='core_redis', port=6379); r.ping(); print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: ["python3", "/app/api_codex_hunters/streams_listener.py"]


  # ══════════════════════════════════════════════════════════════════════════
  #  MONITORING — Prometheus, Grafana, Exporters, Portainer
  # ══════════════════════════════════════════════════════════════════════════

  prometheus:
    image: prom/prometheus:latest
    container_name: core_prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "15000:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    networks:
      - core-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: core_grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=vitruvyan_admin
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_SERVER_DOMAIN=localhost
      - GF_INSTALL_PLUGINS=redis-datasource
      - GF_PLUGINS_ANGULAR_SUPPORT=true
      - GF_FEATURE_TOGGLES_ENABLE=angularDeprecationUI
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - core-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: core_redis_exporter
    restart: always
    environment:
      - REDIS_ADDR=core_redis:6379
    ports:
      - "9121:9121"
    depends_on:
      - redis
    networks:
      - core-net

  redis_streams_exporter:
    build:
      context: ../../services/redis_streams_exporter
      dockerfile: Dockerfile
    container_name: core_redis_streams_exporter
    restart: always
    environment:
      - REDIS_HOST=core_redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - EXPORTER_PORT=9121
      - SCRAPE_INTERVAL=15
    ports:
      - "9122:9121"
    depends_on:
      - redis
    networks:
      - core-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import requests; requests.get('http://localhost:9121/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: core_postgres_exporter
    restart: always
    environment:
      - DATA_SOURCE_NAME=postgresql://vitruvyan_user:@Caravaggio971@172.17.0.1:5432/vitruvyan?sslmode=disable
      - PG_EXPORTER_EXTEND_QUERY_PATH=/etc/postgres_exporter/queries.yml
    ports:
      - "9187:9187"
    volumes:
      - ./monitoring/postgres_exporter_queries.yml:/etc/postgres_exporter/queries.yml:ro
    networks:
      - core-net

  node_exporter:
    image: prom/node-exporter:latest
    container_name: core_node_exporter
    restart: always
    command:
      - '--path.rootfs=/host'
    ports:
      - "9100:9100"
    volumes:
      - /:/host:ro,rslave
    networks:
      - core-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: core_cadvisor
    restart: always
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    ports:
      - "9081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - core-net

  portainer:
    image: portainer/portainer-ce:latest
    container_name: core_portainer
    restart: always
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data_core:/data
    networks:
      - core-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3


# ══════════════════════════════════════════════════════════════════════════
#  VOLUMES & NETWORK
# ══════════════════════════════════════════════════════════════════════════

volumes:
  redis_data_core:
    external: true
    name: docker_redis_data_core
  postgres_data_core:
    external: true
    name: docker_postgres_data_core
  qdrant_data_core:
    external: true
    name: docker_qdrant_data_core
  babel_gardens_models:
    external: true
    name: docker_babel_gardens_models
  babel_gardens_logs:
    external: true
    name: docker_babel_gardens_logs
  vault_keeper_data:
    external: true
    name: docker_vault_keeper_data
  prometheus_data:
    external: true
    name: docker_prometheus_data
  grafana_data:
    external: true
    name: docker_grafana_data
  portainer_data_core:

networks:
  core-net:
    external: true
    name: vitruvyan_core_net
