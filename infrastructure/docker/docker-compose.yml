# ============================================================================
# MERCATOR — Docker Compose Stack (Finance Vertical)
# ============================================================================
# Naming:    mercator_<service>
# Network:   mercator-net
# Ports:     2xxx (external) → 8xxx (internal)
# Volumes:   <service>_data_mercator
# Database:  mercator / mercator_user
# Portainer: mercator stack
# ============================================================================

# Stack name (for Portainer visibility)
name: mercator

services:

  # ══════════════════════════════════════════════════════════════════════════
  #  INFRASTRUCTURE — Redis, PostgreSQL, Qdrant, Keycloak
  # ══════════════════════════════════════════════════════════════════════════

  redis:
    image: redis:7.2-alpine
    container_name: mercator_redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1
    ports:
      - "2379:6379"
    volumes:
      - redis_data_mercator:/data
    networks:
      - mercator-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: mercator_postgres
    restart: always
    environment:
      POSTGRES_DB: mercator
      POSTGRES_USER: mercator_user
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-mercator_pass}"
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "2432:5432"
    volumes:
      - postgres_data_mercator:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - mercator-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mercator_user -d mercator"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.15.0
    container_name: mercator_qdrant
    restart: always
    ports:
      - "2333:6333"
      - "2334:6334"
    volumes:
      - qdrant_data_mercator:/qdrant/storage
    networks:
      - mercator-net

  keycloak_db:
    image: postgres:16-alpine
    container_name: mercator_keycloak_db
    restart: always
    env_file:
      - ./keycloak/keycloak.env
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - mercator-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: mercator_keycloak
    restart: always
    depends_on:
      keycloak_db:
        condition: service_healthy
    command:
      - start
      - --proxy=edge
      - --hostname-url=https://auth.vitruvyan.com
      - --hostname-admin-url=https://auth.vitruvyan.com
      - --hostname-strict=false
      - --http-relative-path=/auth
      - --http-enabled=true
    environment:
      KC_HOSTNAME_URL: https://auth.vitruvyan.com
      KC_HOSTNAME_ADMIN_URL: https://auth.vitruvyan.com
      KC_HOSTNAME_STRICT: false
      KC_HTTP_RELATIVE_PATH: /auth
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KEYCLOAK_ADMIN: admin
    ports:
      - "127.0.0.1:2080:8080"
    env_file:
      - ./keycloak/keycloak.env
    volumes:
      - ./keycloak/bootstrap-kb.sh:/bootstrap-kb.sh:ro
    networks:
      - mercator-net


  # ══════════════════════════════════════════════════════════════════════════
  #  ORCHESTRATION — Graph Engine, Neural Engine, Embedding
  # ══════════════════════════════════════════════════════════════════════════

  graph:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.api_graph
    container_name: mercator_graph
    restart: unless-stopped
    ports:
      - "2004:8004"
    environment:
      # ── Domain verticalization (finance) ──
      - INTENT_DOMAIN=finance
      - GRAPH_DOMAIN=finance
      - ENTITY_DOMAIN=finance
      - CAN_ENABLED=0
      - DISABLE_SLOT_FILLING=1
      - USE_MCP=0
      # ── Core ──
      - LANGGRAPH_ENABLED=0
      - DISPATCHER_URL=http://graph:8004/dispatch
      - DISPATCHER_HEALTH_URL=http://graph:8004/health
      - GRAPH_HTTP_TIMEOUT=120
      - POSTGRES_HOST=${POSTGRES_HOST:-mercator_postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-mercator}
      - POSTGRES_USER=${POSTGRES_USER:-mercator_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4o-mini
      - GRAPH_LLM_MODEL=gpt-4o-mini
      - INTENT_LLM_MODEL=gpt-4o
      - QDRANT_HOST=${QDRANT_HOST:-mercator_qdrant}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      - NE_BASE_URL=http://neural_engine:8003
      - NEURAL_ENGINE_URL=http://neural_engine:8003
      - SENTIMENT_API_URL=http://babel_gardens:8009
      - BABEL_GARDENS_URL=http://babel_gardens:8009
      - BABEL_API_URL=http://babel_gardens:8009
      - EMBEDDING_API_URL=http://embedding:8010
      - REDIS_HOST=mercator_redis
      - REDIS_PORT=6379
      - LLM_CACHE_ENABLED=true
      - LLM_CACHE_TTL_HOURS=24
      - LLM_CACHE_MAX_SIZE=10000
      # VSGS (Semantic Grounding)
      - VSGS_ENABLED=${VSGS_ENABLED:-1}
      - VSGS_GROUNDING_TOPK=${VSGS_GROUNDING_TOPK:-3}
      - VSGS_PROMPT_BUDGET_CHARS=${VSGS_PROMPT_BUDGET_CHARS:-800}
      - VSGS_STORE_EVERY_N=${VSGS_STORE_EVERY_N:-1}
    depends_on:
      - redis
      - postgres
    networks:
      - mercator-net

  neural_engine:
    build:
      context: ../..
      dockerfile: services/api_neural_engine/Dockerfile
    container_name: mercator_neural_engine
    restart: unless-stopped
    ports:
      - "2003:8003"
    environment:
      PYTHONPATH: /app
      LOG_LEVEL: info
      DOMAIN: finance
      POSTGRES_HOST: ${POSTGRES_HOST:-mercator_postgres}
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-mercator}
      POSTGRES_USER: ${POSTGRES_USER:-mercator_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      - postgres
    networks:
      - mercator-net

  edge_oculus_prime:
    build:
      context: ../..
      dockerfile: services/api_edge_oculus_prime/Dockerfile
    container_name: mercator_edge_oculus_prime
    restart: unless-stopped
    ports:
      - "2050:8050"
    environment:
      - PYTHONPATH=/app:/app/vitruvyan_core
      - HOST=0.0.0.0
      - PORT=8050
      - LOG_LEVEL=INFO
      - POSTGRES_HOST=${POSTGRES_HOST:-mercator_postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-mercator}
      - POSTGRES_USER=${POSTGRES_USER:-mercator_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=mercator_redis
      - REDIS_PORT=6379
      - OCULUS_PRIME_EVENT_MIGRATION_MODE=${OCULUS_PRIME_EVENT_MIGRATION_MODE:-dual_write}
    depends_on:
      - redis
      - postgres
    networks:
      - mercator-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mcp:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.api_mcp
    container_name: mercator_mcp
    restart: unless-stopped
    ports:
      - "2020:8020"
    environment:
      - PYTHONPATH=/app:/app/vitruvyan_core
      - LOG_LEVEL=${MCP_LOG_LEVEL:-INFO}
      - PORT=8020
      - MCP_DOMAIN=finance
      # PostgreSQL
      - POSTGRES_HOST=${POSTGRES_HOST:-mercator_postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-mercator}
      - POSTGRES_USER=${POSTGRES_USER:-mercator_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      # Redis (StreamBus)
      - REDIS_HOST=mercator_redis
      - REDIS_PORT=6379
      # MCP Validation Config (domain-agnostic thresholds)
      - MCP_Z_THRESHOLD=${MCP_Z_THRESHOLD:-3.0}
      - MCP_COMPOSITE_THRESHOLD=${MCP_COMPOSITE_THRESHOLD:-5.0}
      - MCP_MIN_SUMMARY_WORDS=${MCP_MIN_SUMMARY_WORDS:-100}
      - MCP_MAX_SUMMARY_WORDS=${MCP_MAX_SUMMARY_WORDS:-200}
      - MCP_FACTOR_KEYS=${MCP_FACTOR_KEYS:-factor_1,factor_2,factor_3,factor_4,factor_5}
      # Finance vertical (Vitruvyan-compatible aliases + sentiment source)
      - MCP_FINANCE_EXPOSE_LEGACY_TOOLS=${MCP_FINANCE_EXPOSE_LEGACY_TOOLS:-true}
      - MCP_FINANCE_SIGNAL_TABLE=${MCP_FINANCE_SIGNAL_TABLE:-sentiment_scores}
      - MCP_FINANCE_SIGNAL_ENTITY_COLUMN=${MCP_FINANCE_SIGNAL_ENTITY_COLUMN:-ticker}
      # External APIs
      - NEURAL_ENGINE_API=http://neural_engine:8003
      - LANGGRAPH_URL=http://graph:8004
      - PATTERN_WEAVERS_API=http://pattern_weavers:8011
      # OpenAI (Function Calling)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${MCP_OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      - redis
      - postgres
      - neural_engine
      - graph
    networks:
      - mercator-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8020/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  embedding:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.api_embedding
    container_name: mercator_embedding
    restart: unless-stopped
    ports:
      - "2010:8010"
    environment:
      - PYTHONPATH=/app
      - POSTGRES_HOST=${POSTGRES_HOST:-mercator_postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-mercator}
      - POSTGRES_USER=${POSTGRES_USER:-mercator_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - QDRANT_URL=${QDRANT_URL:-http://mercator_qdrant:6333}
      - REDIS_URL=${REDIS_URL:-redis://mercator_redis:6379}
    depends_on:
      - redis
      - postgres
      - qdrant
    networks:
      - mercator-net


  # ══════════════════════════════════════════════════════════════════════════
  #  SACRED ORDERS — Orthodoxy Wardens, Vault Keepers, Synaptic Conclave
  # ══════════════════════════════════════════════════════════════════════════

  orthodoxy_wardens:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.orthodoxy_wardens
    container_name: mercator_orthodoxy_wardens
    restart: unless-stopped
    ports:
      - "2006:8006"
    environment:
      PYTHONPATH: /app
      POSTGRES_HOST: ${POSTGRES_HOST:-mercator_postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-mercator}
      POSTGRES_USER: ${POSTGRES_USER:-mercator_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_HOST: mercator_redis
      REDIS_PORT: 6379
      QDRANT_HOST: ${QDRANT_HOST:-mercator_qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      # Sacred Configuration
      ORTHODOXY_MONITORING_INTERVAL: 300
      DIVINE_AUTO_CORRECTION_ENABLED: "true"
      SACRED_COMPLIANCE_THRESHOLD: 0.8
      CONFESSION_AUTO_ABSOLUTION: "false"
      # Vertical activation
      ORTHODOXY_DOMAIN: finance
      ORTHODOXY_RULESET_VERSION: ${ORTHODOXY_RULESET_VERSION:-v1.1-finance}
    volumes:
      - ../../services/api_orthodoxy_wardens:/app/api_orthodoxy_wardens:ro
      - ../../vitruvyan_core/core:/app/core:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - redis
      - postgres
      - qdrant
    networks:
      - mercator-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  vault_keepers:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.vault_keepers
    container_name: mercator_vault_keepers
    restart: unless-stopped
    ports:
      - "2007:8007"
    environment:
      - PYTHONPATH=/app
      # Database
      - POSTGRES_HOST=${POSTGRES_HOST:-mercator_postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-mercator}
      - POSTGRES_USER=${POSTGRES_USER:-mercator_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      # Vector DB
      - QDRANT_HOST=${QDRANT_HOST:-mercator_qdrant}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      # Redis (Cognitive Bus)
      - REDIS_HOST=mercator_redis
      - REDIS_PORT=6379
      # API
      - VAULT_API_HOST=0.0.0.0
      - VAULT_API_PORT=8007
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VAULT_LOG_LEVEL=INFO
      # Vertical activation
      - VAULT_DOMAIN=finance
      - VAULT_FINANCE_DEFAULT_BACKUP_MODE=full
      - VAULT_FINANCE_INCLUDE_VECTORS=true
      - VAULT_FINANCE_ARCHIVE_RETENTION_DAYS=${VAULT_FINANCE_ARCHIVE_RETENTION_DAYS:-1825}
      - VAULT_FINANCE_SIGNAL_RETENTION_DAYS=${VAULT_FINANCE_SIGNAL_RETENTION_DAYS:-1825}
      # Backup
      - BACKUP_MODE=auto
      - BACKUP_STORAGE=/var/vitruvyan/vaults
      - BACKUP_INTERVAL_MINUTES=30
      # Google Drive Backup
      - GDRIVE_ENABLED=true
      - GDRIVE_USE_OAUTH=true
      - GDRIVE_FOLDER_ID=1fSFXHXSKKEmTMPZlaYdvjaSNQ6iChIpb
      - GDRIVE_TOKEN_PATH=/app/secrets/token.json
      - GDRIVE_SERVICE_ACCOUNT_PATH=/app/secrets/gdrive-service-account.json
      - GDRIVE_BACKUP_MODE=incremental
      - GDRIVE_AUTO_DELETE_LOCAL=true
      - GDRIVE_KEEP_COUNT=30
    volumes:
      - ../../services/api_vault_keepers:/app/api_vault_keepers:ro
      - ../../vitruvyan_core/core:/app/core:ro
      - vault_keeper_data:/var/vitruvyan/vaults
      - ../../infrastructure/secrets:/app/secrets:ro
    depends_on:
      - redis
      - qdrant
    networks:
      - mercator-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  conclave:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.api_conclave
    container_name: mercator_conclave
    restart: unless-stopped
    ports:
      - "2012:8012"
    environment:
      # Redis (Cognitive Bus)
      - REDIS_URL=redis://mercator_redis:6379/0
      - REDIS_HOST=mercator_redis
      - CONCLAVE_PORT=8012
      # Database
      - POSTGRES_HOST=${POSTGRES_HOST:-mercator_postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      # Sacred Order endpoints
      - BABEL_GARDENS_URL=http://babel_gardens:8009
      - MEMORY_ORDERS_URL=http://memory_orders:8016
      - ORTHODOXY_WARDENS_URL=http://orthodoxy_wardens:8006
      - VAULT_KEEPERS_URL=http://vault_keepers:8007
      - NEURAL_ENGINE_URL=http://neural_engine:8003
      - SENTIMENT_API_URL=http://babel_gardens:8009
      - GRAPH_ORCHESTRATOR_URL=http://graph:8004
      # Conclave config
      - CONCLAVE_HOST=0.0.0.0
      - PULSE_INTERVAL=30
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs/conclave:/app/logs/conclave
    depends_on:
      - redis
      - babel_gardens
    networks:
      - mercator-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/health"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 30s


  # ══════════════════════════════════════════════════════════════════════════
  #  COGNITIVE SERVICES — Babel Gardens, Memory Orders, Codex, Weavers
  # ══════════════════════════════════════════════════════════════════════════

  babel_gardens:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.api_babel_gardens
    container_name: mercator_babel_gardens
    restart: unless-stopped
    ports:
      - "2009:8009"
    environment:
      # Redis (Cognitive Bus)
      - REDIS_URL=redis://mercator_redis:6379/0
      - REDIS_HOST=mercator_redis
      - REDIS_PORT=6379
      # Database
      - POSTGRES_HOST=${POSTGRES_HOST:-mercator_postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-mercator}
      - POSTGRES_USER=${POSTGRES_USER:-mercator_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mercator_pass}
      - QDRANT_URL=${QDRANT_URL:-http://mercator_qdrant:6333}
      # Service URLs
      - NEURAL_ENGINE_URL=http://neural_engine:8003
      # Vertical activation
      - BABEL_DOMAIN=finance
      # Comprehension Engine v3
      - BABEL_COMPREHENSION_V3=1
      # LLM (Nuclear Option - emotion/sentiment)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Model config
      - HUGGINGFACE_HUB_CACHE=/app/models
      - TRANSFORMERS_CACHE=/app/models
      - TORCH_HOME=/app/models
      - HUGGINGFACE_HUB_TOKEN=${HUGGINGFACE_HUB_TOKEN}
      # Performance
      - CUDA_VISIBLE_DEVICES=
      - OMP_NUM_THREADS=4
      - TOKENIZERS_PARALLELISM=false
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    volumes:
      - babel_gardens_models:/app/models
      - babel_gardens_logs:/app/logs
    depends_on:
      - redis
      - postgres
      - qdrant
    networks:
      - mercator-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  memory_orders:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.api_memory_orders
    container_name: mercator_memory_orders
    restart: unless-stopped
    ports:
      - "2016:8016"
    environment:
      # Redis (Cognitive Bus)
      - REDIS_URL=redis://mercator_redis:6379/0
      - REDIS_HOST=mercator_redis
      - REDIS_PORT=6379
      # Database (Archivarium)
      - POSTGRES_HOST=${POSTGRES_HOST:-mercator_postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-mercator}
      - POSTGRES_USER=${POSTGRES_USER:-mercator_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      # Vector DB (Mnemosyne)
      - QDRANT_HOST=${QDRANT_HOST:-mercator_qdrant}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      - QDRANT_URL=${QDRANT_URL:-http://mercator_qdrant:6333}
      # Embedding Service
      - EMBEDDING_SERVICE_URL=http://embedding:8010/embed
      # Memory config
      - MEMORY_API_HOST=0.0.0.0
      - MEMORY_API_PORT=8016
      - MEMORY_DOMAIN=finance
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      # Performance
      - MEMORY_WRITE_TIMEOUT=5.0
      - MEMORY_READ_TIMEOUT=3.0
      - MEMORY_VECTOR_TIMEOUT=8.0
      - DUAL_MEMORY_COHERENCE_CHECK=true
    volumes:
      - ../../services/api_memory_orders:/app/api_memory_orders:ro
      - ../../vitruvyan_core/core/foundation/semantic_sync:/app/core/foundation/semantic_sync:ro
      - ../../vitruvyan_core/core/foundation/persistence:/app/core/foundation/persistence:ro
      - ../../vitruvyan_core/core/foundation/cognitive_bus:/app/core/foundation/cognitive_bus:ro
      - ./logs/memory_orders:/app/logs/memory_orders
    depends_on:
      - redis
      - qdrant
      - embedding
      - babel_gardens
    networks:
      - mercator-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8016/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  memory_orders_listener:
    build:
      context: ../..
      dockerfile: infrastructure/docker/dockerfiles/Dockerfile.api_memory_orders
    container_name: mercator_memory_orders_listener
    restart: unless-stopped
    environment:
      # Redis (Cognitive Bus)
      - REDIS_HOST=mercator_redis
      - REDIS_PORT=6379
      # Database (Archivarium)
      - POSTGRES_HOST=${POSTGRES_HOST:-mercator_postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-mercator}
      - POSTGRES_USER=${POSTGRES_USER:-mercator_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      # Vector DB (Mnemosyne)
      - QDRANT_HOST=${QDRANT_HOST:-mercator_qdrant}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      - QDRANT_URL=${QDRANT_URL:-http://mercator_qdrant:6333}
      # Embedding Service
      - EMBEDDING_SERVICE_URL=http://embedding:8010/embed
      # Babel Gardens
      - BABEL_GARDENS_URL=http://babel_gardens:8009
      # Config
      - MEMORY_DOMAIN=finance
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - MEMORY_LISTENER_ENABLED=1
    volumes:
      - ../../services/api_memory_orders:/app/api_memory_orders:ro
      - ../../vitruvyan_core/core:/app/core:ro
      - ./logs/memory_orders_listener:/app/logs
    depends_on:
      - redis
      - memory_orders
      - babel_gardens
    networks:
      - mercator-net
    healthcheck:
