  # ══════════════════════════════════════════════════════════════════════════
  #  MONITORING — Prometheus, Grafana, Exporters, Portainer
  # ══════════════════════════════════════════════════════════════════════════

  prometheus:
    image: prom/prometheus:latest
    container_name: mercator_prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "2500:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    networks:
      - mercator-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: mercator_grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=vitruvyan_admin
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_SERVER_DOMAIN=localhost
      - GF_INSTALL_PLUGINS=redis-datasource
      - GF_PLUGINS_ANGULAR_SUPPORT=true
      - GF_FEATURE_TOGGLES_ENABLE=angularDeprecationUI
    ports:
      - "2300:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - mercator-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: mercator_redis_exporter
    restart: always
    environment:
      - REDIS_ADDR=mercator_redis:6379
    ports:
      - "2121:9121"
    depends_on:
      - redis
    networks:
      - mercator-net

  redis_streams_exporter:
    build:
      context: ../../services/redis_streams_exporter
      dockerfile: Dockerfile
    container_name: mercator_redis_streams_exporter
    restart: always
    environment:
      - REDIS_HOST=mercator_redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - EXPORTER_PORT=9121
      - SCRAPE_INTERVAL=15
    ports:
      - "2122:9121"
    depends_on:
      - redis
    networks:
      - mercator-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9121/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: mercator_postgres_exporter
    restart: always
    environment:
      - DATA_SOURCE_NAME=postgresql://vitruvyan_user:${POSTGRES_PASSWORD}@172.17.0.1:5432/vitruvyan?sslmode=disable
      - PG_EXPORTER_EXTEND_QUERY_PATH=/etc/postgres_exporter/queries.yml
    ports:
      - "2187:9187"
    volumes:
      - ./monitoring/postgres_exporter_queries.yml:/etc/postgres_exporter/queries.yml:ro
    networks:
      - mercator-net

  node_exporter:
    image: prom/node-exporter:latest
    container_name: mercator_node_exporter
    restart: always
    command:
      - '--path.rootfs=/host'
    ports:
      - "2100:9100"
    volumes:
      - /:/host:ro,rslave
    networks:
      - mercator-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: mercator_cadvisor
    restart: always
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    ports:
      - "2081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - mercator-net

  portainer:
    image: portainer/portainer-ce:latest
    container_name: mercator_portainer
    restart: always
    ports:
      - "2900:9000"
      - "2943:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data_mercator:/data
    networks:
      - mercator-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  mkdocs:
    image: vitruvyan/mkdocs:latest
    build:
      context: ./mkdocs
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:2800:8000"
    volumes:
      - ../../docs:/app/docs:ro
      - ../../vitruvyan_core:/app/vitruvyan_core:ro
      - ../../services:/app/services:ro
      - ../../infrastructure:/app/infrastructure:ro
      - ../../tests:/app/tests:ro
      - ../../examples:/app/examples:ro
      - ../../config:/app/config:ro
      - ../../scripts:/app/scripts:ro
      - ../../index.md:/app/index.md:ro
      - ../../index.it.md:/app/index.it.md:ro
      - ./mkdocs/mkdocs.yml:/app/mkdocs.yml:ro
      - ./mkdocs/mkdocs.public.yml:/app/mkdocs.public.yml:ro
      - ./mkdocs/mkdocs.docs.yml:/app/mkdocs.docs.yml:ro
      - ./mkdocs/build-all.sh:/app/build-all.sh:ro
      - mkdocs_site:/app/site
      - mkdocs_site_public:/app/site_public
      - mkdocs_site_docs_public:/app/site_docs_public
    working_dir: /app
    command: sh -c "/app/build-all.sh && mkdocs serve -a 0.0.0.0:8000 --config-file mkdocs.yml --dev-addr 0.0.0.0:8000"
    networks:
      - mercator-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3


