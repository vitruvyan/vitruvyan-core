# Prometheus Configuration for Vitruvyan Core
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'vitruvyan-core'

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']
  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']
  - job_name: 'redis_streams'
    static_configs:
      - targets: ['core_redis_streams_exporter:9121']
    metrics_path: /metrics
    scrape_interval: 15s
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
  - job_name: 'memory_orders'
    static_configs:
      - targets: ['core_memory_orders:8016']
    metrics_path: /metrics
  - job_name: 'vault_keepers'
    static_configs:
      - targets: ['core_vault_keepers:8007']
    metrics_path: /metrics
  - job_name: 'orthodoxy_wardens'
    static_configs:
      - targets: ['core_orthodoxy_wardens:8006']
    metrics_path: /metrics
  - job_name: 'babel_gardens'
    static_configs:
      - targets: ['core_babel_gardens:8009']
    metrics_path: /metrics
  - job_name: 'codex_hunters'
    static_configs:
      - targets: ['core_codex_hunters:8008']
    metrics_path: /metrics
  - job_name: 'pattern_weavers'
    static_configs:
      - targets: ['core_pattern_weavers:8011']
    metrics_path: /metrics
  - job_name: 'embedding'
    static_configs:
      - targets: ['embedding:8000']
    metrics_path: /metrics
  - job_name: 'graph'
    static_configs:
      - targets: ['graph:8000']
    metrics_path: /metrics
  - job_name: 'neural_engine'
    static_configs:
      - targets: ['neural_engine:8000']
    metrics_path: /metrics
  - job_name: 'conclave'
    static_configs:
      - targets: ['conclave:8000']
    metrics_path: /metrics
