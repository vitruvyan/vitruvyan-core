services:
  nginx:
    image: nginx:stable
    container_name: core_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "9190:9190"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd_advanced:/etc/nginx/.htpasswd_advanced:ro
      - ./certbot/www:/var/www/certbot:rw
      - ./certbot/conf:/etc/letsencrypt:rw
      - mkdocs_site_public:/var/www/mkdocs/site_public:ro
      - mkdocs_site_docs_public:/var/www/mkdocs/site_docs_public:ro
      - mkdocs_site_admin:/var/www/mkdocs/site_admin:ro
    networks:
      - monitoring-net
      - core-net

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: core_oauth2_proxy
    restart: unless-stopped
    env_file:
      - ./oauth2-proxy/oauth2-proxy.env
    command:
      - --http-address=0.0.0.0:4180
      - --provider=oidc
      - --oidc-issuer-url=https://auth.vitruvyan.com/realms/vitruvyan-core
      - --client-id=kb
      - --scope=openid email profile groups
      - --code-challenge-method=S256
      - --email-domain=*
      - --redirect-url=https://kb.vitruvyan.com/oauth2/callback
      - --upstream=static://200
      - --reverse-proxy=true
      - --skip-provider-button=true
      - --set-xauthrequest=true
      - --cookie-name=_vitruvyan_kb
      - --cookie-domain=kb.vitruvyan.com
      - --cookie-path=/
      - --cookie-secure=true
      - --cookie-samesite=lax
      - --whitelist-domain=kb.vitruvyan.com
    networks:
      - monitoring-net

  certbot:
    image: certbot/certbot:latest
    container_name: core_certbot
    entrypoint: ["/bin/sh", "-c", "trap exit TERM; while :; do sleep 6h & wait $${!}; done;"]
    volumes:
      - ./certbot/www:/var/www/certbot:rw
      - ./certbot/conf:/etc/letsencrypt:rw
    networks:
      - monitoring-net

networks:
  monitoring-net:
    driver: bridge
  core-net:
    external: true
    name: vitruvyan_core_net

volumes:
  mkdocs_site_public:
    external: true
    name: vitruvyan-core_mkdocs_site_public
  mkdocs_site_docs_public:
    external: true
    name: vitruvyan-core_mkdocs_site_docs_public
  mkdocs_site_admin:
    external: true
    name: vitruvyan-core_mkdocs_site
