version: '3.8'

services:
  nginx:
    image: nginx:stable
    container_name: core_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:rw
      - ./certbot/conf:/etc/letsencrypt:rw
    networks:
      - monitoring-net

  certbot:
    image: certbot/certbot:2.7.0
    container_name: core_certbot
    entrypoint: ["/bin/sh", "-c", "trap exit TERM; while :; do sleep 6h & wait $${!}; done;"]
    volumes:
      - ./certbot/www:/var/www/certbot:rw
      - ./certbot/conf:/etc/letsencrypt:rw
    networks:
      - monitoring-net

networks:
  monitoring-net:
    driver: bridge
