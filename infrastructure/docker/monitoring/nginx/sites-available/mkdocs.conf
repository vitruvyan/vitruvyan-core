# ============================================================================
# Nginx Configuration — MkDocs Landing Page + Authenticated Docs
# ============================================================================
# Purpose: Serve public landing page (static) + authenticated full docs (proxied)
# Public:  /        → site_public (static HTML, no authentication)
# Full:    /docs/*  → site (htpasswd basic authentication)
# Advanced: /planning/*, /architecture/technical-* → site (htpasswd advanced)
# ============================================================================

upstream mkdocs_backend {
    server core_mkdocs:8000;
}

server {
    listen 80;
    server_name kb.vitruvyan.com;

    # Redirect HTTP → HTTPS (production)
    # return 301 https://$server_name$request_uri;

    # ========================================================================
    # PUBLIC LANDING PAGE (No Authentication - Static Files)
    # ========================================================================
    location = / {
        # Serve site_public as static files (landing page only)
        root /var/www/mkdocs;
        try_files /site_public/index.html =404;
    }

    location ~* ^/(public|assets|search)/ {
        # Static assets from public site
        root /var/www/mkdocs/site_public;
        try_files $uri $uri/ =404;
    }

    # ========================================================================
    # ADVANCED ACCESS (Planning & Technical Debt) - Check FIRST
    # ========================================================================
    location ~ ^/(planning|architecture/.*technical) {
        # Separate htpasswd for advanced users
        auth_basic "Vitruvyan Knowledge Base - Advanced Access";
        auth_basic_user_file /etc/nginx/.htpasswd_advanced;

        proxy_pass http://mkdocs_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ========================================================================
    # AUTHENTICATED ACCESS (Full Documentation - Basic Users)
    # ========================================================================
    location ~ ^/(docs|services|infrastructure|examples|vitruvyan_core|config|scripts|tests) {
        # HTTP Basic Authentication
        auth_basic "Vitruvyan Knowledge Base - Developer Access";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://mkdocs_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check endpoint (no auth)
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

