# ============================================================================
# Nginx Configuration — MkDocs Landing Page + Authenticated Docs
# ============================================================================
# Purpose: Serve public landing page (static) + authenticated full docs (proxied)
# Public:  /        → site_public (static HTML, no authentication)
# Full:    /docs/*  → site (htpasswd basic authentication)
# Advanced: /planning/*, /architecture/technical-* → site (htpasswd advanced)
# ============================================================================

upstream mkdocs_backend {
    server core_mkdocs:8000;
}

server {
    listen 80;
    server_name kb.vitruvyan.com;

    # Redirect HTTP → HTTPS (production)
    # return 301 https://$server_name$request_uri;

    # ========================================================================
    # PUBLIC LANDING PAGE (No Authentication - Static)
    # ========================================================================
    location = / {
        root /var/www/mkdocs;
        try_files /site_public/index.html =404;
    }

    location = /it/ {
        root /var/www/mkdocs;
        try_files /site_public/it/index.html =404;
    }

    location ^~ /assets/ {
        root /var/www/mkdocs/site_public;
        try_files $uri =404;
    }

    # ========================================================================
    # PUBLIC DOCUMENTATION (No Authentication - Static)
    # ========================================================================
    location ^~ /docs/ {
        alias /var/www/mkdocs/site_docs_public/;
        try_files $uri $uri/ /index.html =404;
    }

    location ^~ /it/docs/ {
        alias /var/www/mkdocs/site_docs_public/it/;
        try_files $uri $uri/ /index.html =404;
    }

    # ========================================================================
    # ADMIN AREA (Authentication required - Static)
    # ========================================================================
    location ^~ /admin/ {
        auth_basic "Vitruvyan Knowledge Base - Admin Access";
        auth_basic_user_file /etc/nginx/.htpasswd_advanced;

        alias /var/www/mkdocs/site_admin/;
        try_files $uri $uri/ /index.html =404;
    }

    location ^~ /it/admin/ {
        auth_basic "Vitruvyan Knowledge Base - Admin Access";
        auth_basic_user_file /etc/nginx/.htpasswd_advanced;

        alias /var/www/mkdocs/site_admin/it/;
        try_files $uri $uri/ /index.html =404;
    }

    # Health check endpoint (no auth)
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

