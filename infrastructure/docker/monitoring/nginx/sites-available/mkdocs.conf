# ============================================================================
# Nginx Configuration — MkDocs Multi-Build (Public + Authenticated)
# ============================================================================
# Purpose: Serve two MkDocs sites with different access levels
# Public:  /public/ → site_public (no authentication)
# Full:    /       → site (htpasswd authentication)
# ============================================================================

upstream mkdocs_backend {
    server core_mkdocs:8000;
}

server {
    listen 80;
    server_name kb.vitruvyan.com;

    # Redirect HTTP → HTTPS (production)
    # return 301 https://$server_name$request_uri;

    # ========================================================================
    # PUBLIC ACCESS (No Authentication)
    # ========================================================================
    location /public/ {
        proxy_pass http://mkdocs_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for hot-reload (dev)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ========================================================================
    # AUTHENTICATED ACCESS (Full Documentation)
    # ========================================================================
    location / {
        # HTTP Basic Authentication
        auth_basic "Vitruvyan Knowledge Base";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://mkdocs_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ========================================================================
    # ADVANCED ACCESS (Planning & Technical Debt)
    # ========================================================================
    location ~ ^/(planning|architecture/.*technical) {
        # Separate htpasswd for advanced users
        auth_basic "Advanced Users Only";
        auth_basic_user_file /etc/nginx/.htpasswd_advanced;

        proxy_pass http://mkdocs_backend/$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint (no auth)
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

