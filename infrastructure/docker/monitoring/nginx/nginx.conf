user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker embedded DNS (enables dynamic upstream resolution when containers are recreated)
    resolver 127.0.0.11 valid=10s ipv6=off;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    gzip  on;

    upstream grafana {
        server core_grafana:3000;
    }

    upstream prometheus {
        server core_prometheus:9090;
    }

    upstream kb {
        zone kb 64k;
        server core_mkdocs:8000 resolve;
    }

    # --------------------------------------------------------------------
    # AUTH (Keycloak) — auth.vitruvyan.com
    #
    # NOTE:
    # - HTTP is enabled only for ACME challenge and redirect.
    # - Enable the HTTPS block after issuing the certificate:
    #   `infrastructure/docker/monitoring/nginx/request-auth-cert.sh`
    # --------------------------------------------------------------------
    server {
        listen 80;
        server_name auth.vitruvyan.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTP: ACME challenge + redirect to HTTPS
    server {
        listen 80;
        server_name dashboard.vitruvyan.com metrics.vitruvyan.com kb.vitruvyan.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS: Keycloak (Auth)
    #
    # Enable after issuing certs for auth.vitruvyan.com:
    #   - /etc/letsencrypt/live/auth.vitruvyan.com/fullchain.pem
    #   - /etc/letsencrypt/live/auth.vitruvyan.com/privkey.pem
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name auth.vitruvyan.com;
    #
    #     ssl_certificate /etc/letsencrypt/live/auth.vitruvyan.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/auth.vitruvyan.com/privkey.pem;
    #
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # Convenience: open `https://auth.vitruvyan.com/` and redirect to Keycloak base path.
    #     location = / {
    #         return 302 /auth/;
    #     }
    #
    #     location ^~ /auth/ {
    #         proxy_pass http://core_keycloak:8080;
    #         proxy_set_header Host $http_host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
    #         proxy_set_header X-Forwarded-Host $host;
    #         proxy_set_header X-Forwarded-Port 443;
    #
    #         proxy_http_version 1.1;
    #         proxy_set_header Upgrade $http_upgrade;
    #         proxy_set_header Connection "upgrade";
    #     }
    # }

    # HTTPS: Grafana
    server {
        listen 443 ssl http2;
        server_name dashboard.vitruvyan.com;

        ssl_certificate /etc/letsencrypt/live/dashboard.vitruvyan.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dashboard.vitruvyan.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://grafana;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # HTTPS: Prometheus
    server {
        listen 443 ssl http2;
        server_name metrics.vitruvyan.com;

        ssl_certificate /etc/letsencrypt/live/metrics.vitruvyan.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/metrics.vitruvyan.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://prometheus;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
        }
    }

    # HTTPS: Knowledge Base (kb)
    server {
        listen 443 ssl http2;
        server_name kb.vitruvyan.com;

        ssl_certificate /etc/letsencrypt/live/kb.vitruvyan.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kb.vitruvyan.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # --------------------------------------------------------------------
        # PUBLIC LANDING (no auth) - static
        # --------------------------------------------------------------------
        location = / {
            root /var/www/mkdocs/site_public;
            try_files /index.html =404;
        }

        location = /it/ {
            root /var/www/mkdocs/site_public;
            try_files /it/index.html =404;
        }

        # Landing assets (CSS/JS/images)
        location ^~ /assets/ {
            root /var/www/mkdocs/site_public;
            try_files $uri $uri/ =404;
            add_header Cache-Control "public, max-age=3600";
        }

        # --------------------------------------------------------------------
        # PUBLIC DOCS (no auth) - static
        # --------------------------------------------------------------------
        location ^~ /docs/ {
            alias /var/www/mkdocs/site_docs_public/;
            try_files $uri $uri/ /index.html =404;
        }

        location ^~ /it/docs/ {
            alias /var/www/mkdocs/site_docs_public/it/;
            try_files $uri $uri/ /index.html =404;
        }

        # --------------------------------------------------------------------
        # ADMIN AREA (auth) - static
        # --------------------------------------------------------------------
        location ^~ /admin/ {
            auth_basic "Vitruvyan Knowledge Base - Admin Access";
            auth_basic_user_file /etc/nginx/.htpasswd_advanced;

            alias /var/www/mkdocs/site_admin/;
            try_files $uri $uri/ /index.html =404;
        }

        location ^~ /it/admin/ {
            auth_basic "Vitruvyan Knowledge Base - Admin Access";
            auth_basic_user_file /etc/nginx/.htpasswd_advanced;

            alias /var/www/mkdocs/site_admin/it/;
            try_files $uri $uri/ /index.html =404;
        }

        # Default deny: don't expose other MkDocs endpoints at the root.
        location / {
            return 404;
        }
    }

    # Fallback (IP/localhost): mantieni path-based
    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Knowledge Base: Public landing page (static files)
        location /mkdocs-public/ {
            alias /var/www/mkdocs/site_public/;
            try_files $uri $uri/ =404;
            add_header Cache-Control "public, max-age=3600";
        }

        # Knowledge Base: Serve public landing on root (TEST ONLY)
        location = /kb {
            alias /var/www/mkdocs/site_public/index.html;
            add_header Content-Type text/html;
        }

        location /grafana/ {
            proxy_pass http://grafana/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /prometheus/ {
            proxy_pass http://prometheus/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 /grafana/;
        }
    }
}
