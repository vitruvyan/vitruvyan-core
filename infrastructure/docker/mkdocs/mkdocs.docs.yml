# ============================================================================
# MkDocs Configuration — PUBLIC DOCUMENTATION (No Authentication)
# ============================================================================
# Purpose: Public-facing docs (main KB) available without password
# Paths:   /docs/ (en) and /it/docs/ (it)
# ============================================================================

site_name: Vitruvyan OS
site_description: Domain-agnostic epistemic operating system
site_author: Vitruvyan Team
site_url: https://kb.vitruvyan.com/docs/

docs_dir: /app/docs_root
site_dir: /app/site_docs_public

# Prevent internal/admin-only pages from being built into the public site.
# MkDocs builds all markdown under `docs_dir` even if it is not in `nav`.
exclude_docs: |
  docs/internal/**
  infrastructure/**
  services/**
  vitruvyan_core/**
  tests/**
  scripts/**
  config/**
  examples/**
  .github/**

theme:
  name: material
  logo: docs/stylesheets/vitruvyan-logo-white.png
  language: en
  font:
    text: Inconsolata
    code: Inconsolata
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: black
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - i18n:
      fallback_to_default: true
      docs_structure: suffix
      languages:
        - locale: en
          name: English
          default: true
          build: true
          link: /docs/
        - locale: it
          name: Italiano
          build: true
          link: /it/docs/
  - search:
      lang:
        - en
        - it
  - material/tags:
      enabled: true
  - mermaid2
  - minify:
      # NOTE: keep Mermaid diagram source newlines intact.
      # htmlmin tends to collapse whitespace inside <div class="mermaid">,
      # which breaks Mermaid parsing ("Syntax error in text").
      minify_html: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3

nav:
  - Home: docs/public/DOCS_HOME.md
  - Getting Started:
    - Overview: docs/foundational/VITRUVYAN_OVERVIEW.md
    - Quick Start: docs/foundational/QUICK_START.md
    - Pipeline Walkthrough: docs/foundational/VITRUVYAN_PIPELINE_WALKTHROUGH.md
  - Installation:
    - Overview: docs/installation/README.md
    - Requirements: docs/installation/REQUIREMENTS.md
    - Local Setup: docs/installation/LOCAL.md
    - Docker Setup: docs/installation/DOCKER.md
    - Production Deployment: docs/installation/PRODUCTION.md
    - Environment Variables: docs/installation/ENV_VARS.md
    - Health Checks: docs/installation/HEALTH_CHECKS.md
  - Architecture:
    - Overview: docs/architecture/README.md
    - Dual Memory Layer: docs/architecture/DUAL_MEMORY_LAYER.md
  - Cognitive Governance:
    - LangGraph Orchestration: docs/knowledge_base/development/verticals/Vertical_Orchestration_LangGraph.md
    - Semantic & Ontology: docs/architecture/SEMANTIC_ONTOLOGY_ARCHITECTURE.md
    - Memory Orders: docs/orders/MEMORY_ORDERS.md
    - RAG Governance:
      - Overview: docs/contracts/rag/README.md
      - Contract V1: docs/contracts/rag/RAG_GOVERNANCE_CONTRACT_V1.md
      - Operations: docs/contracts/rag/RAG_GOVERNANCE_OPERATIONS.md
  - Sacred Orders:
    - Introduction: docs/foundational/SACRED_ORDERS_INTRO.md
    - Index: docs/orders/README.md
    - Codex Hunters: docs/orders/CODEX_HUNTERS.md
    - Memory Orders: docs/orders/MEMORY_ORDERS.md
    - Vault Keepers: docs/orders/VAULT_KEEPERS.md
    - Orthodoxy Wardens: docs/orders/ORTHODOXY_WARDENS.md
    - Babel Gardens: docs/orders/BABEL_GARDENS.md
    - Pattern Weavers: docs/orders/PATTERN_WEAVERS.md

extra_css:
  - docs/stylesheets/material_v1.css?v=20260226a

extra_javascript:
  - docs/javascripts/vitruvyan.js?v=20260226a

copyright: Copyright &copy; 2026 Vitruvyan Team
