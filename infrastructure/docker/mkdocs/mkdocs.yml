# ============================================================================
# MkDocs Configuration — Vitruvyan Core Knowledge Base
# ============================================================================
# Last Updated: February 12, 2026
# Purpose: User & administrator documentation (domain-agnostic epistemic OS)
# Deploy: docker compose up -d mkdocs → http://localhost:9800
# Build:  mkdocs build → site/ (static HTML)
# ============================================================================

site_name: Vitruvyan OS
site_description: Domain-agnostic epistemic operating system
site_author: Vitruvyan Team
site_url: https://kb.vitruvyan.com/admin/

# Docs directory (symlinked docs root)
docs_dir: /app/docs_root
site_dir: /app/site

# Theme configuration
theme:
  name: simple-blog
  language: en
  sidebar: true
  navigation_depth: 3
  
# Plugins
plugins:
  - i18n:
      fallback_to_default: true
      docs_structure: suffix
      languages:
        - locale: en
          name: English
          default: true
          build: true
          link: /admin/
        - locale: it
          name: Italiano
          build: true
          link: /it/admin/
  - search:
      lang:
        - en
        - it
  # git-revision-date-localized disabled (requires git repo in mounted volumes)
  # - git-revision-date-localized:
  #     enable_creation_date: true
  #     type: timeago
  - mermaid2
  - minify:
      minify_html: true

# Markdown extensions
markdown_extensions:
  - admonition              # Callouts (notes, warnings, etc.)
  - pymdownx.details        # Collapsible admonitions
  - pymdownx.superfences:   # Code blocks, Mermaid diagrams
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:        # Content tabs
      alternate_style: true
  - pymdownx.highlight:     # Syntax highlighting
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite   # Inline code highlighting
  - pymdownx.snippets       # Include external files
  - pymdownx.tasklist:      # Task lists
      custom_checkbox: true
  - tables                  # Tables support
  - footnotes               # Footnotes
  - attr_list               # Add attributes to elements
  - md_in_html              # Markdown in HTML
  - toc:                    # Table of contents
      permalink: true
      toc_depth: 3

# Navigation structure
nav:
  - Home: docs/index.md
  
  - Getting Started:
    - Overview: docs/foundational/VITRUVYAN_OVERVIEW.md
    - Quick Start: docs/foundational/QUICK_START.md
    - Epistemic Charter: docs/foundational/Vitruvyan_Epistemic_Charter.md
    - Pipeline Walkthrough: docs/foundational/VITRUVYAN_PIPELINE_WALKTHROUGH.md

  - Installation:
    - Overview: docs/installation/README.md
    - Requirements: docs/installation/REQUIREMENTS.md
    - Local Setup: docs/installation/LOCAL.md
    - Docker Setup: docs/installation/DOCKER.md
    - Production Deployment: docs/installation/PRODUCTION.md
    - Environment Variables: docs/installation/ENV_VARS.md
    - Health Checks: docs/installation/HEALTH_CHECKS.md
    
  - Architecture:
    - Overview: docs/architecture/README.md
    - Sacred Orders Pattern: vitruvyan_core/core/governance/SACRED_ORDER_PATTERN.md
    - Cognitive Bus: vitruvyan_core/core/synaptic_conclave/docs/README.md
    - Technical Debt Audit: docs/architecture/TECHNICAL_DEBT_AUDIT.md
    
  - Sacred Orders:
    - Index: docs/internal/orders/README.md
    - Codex Hunters: docs/internal/orders/CODEX_HUNTERS.md
    - Orthodoxy Wardens: docs/internal/orders/ORTHODOXY_WARDENS.md
    - Vault Keepers: docs/internal/orders/VAULT_KEEPERS.md
    - Memory Orders: docs/internal/orders/MEMORY_ORDERS.md
    - Babel Gardens: docs/internal/orders/BABEL_GARDENS.md
    - Pattern Weavers: docs/internal/orders/PATTERN_WEAVERS.md
    
  - Services:
    - Overview: services/README_SERVICES.md
    - API Graph: services/api_graph/README.md
    - API MCP: services/api_mcp/README.md
    - Sacred Orders APIs:
      - Index: docs/internal/services/README.md
      - Pattern Weavers API: docs/internal/services/PATTERN_WEAVERS_API.md
      - Codex Hunters API: docs/internal/services/CODEX_HUNTERS_API.md
      - Memory Orders API: docs/internal/services/MEMORY_ORDERS_API.md
      - Orthodoxy Wardens API: docs/internal/services/ORTHODOXY_WARDENS_API.md
      - Vault Keepers API: docs/internal/services/VAULT_KEEPERS_API.md
    
  - Infrastructure:
    - Overview: infrastructure/README_INFRASTRUCTURE.md
    - Docker Setup: infrastructure/docker/README.md
    - Monitoring: infrastructure/docker/monitoring/README.md
    - KB Access Control: infrastructure/docker/mkdocs/ACCESS_CONTROL.md
    
  - Development:
    - Testing: tests/README_TESTS.md
    - Templates: docs/foundational/TEMPLATE_SACRED_ORDER_COMPONENT.md
    - Verticals:
      - Pattern: examples/verticals/README.md
      - Finance:
        - Codex Hunters Domain Pack: examples/verticals/finance/CODEX_HUNTERS_DOMAIN_PACK.md
    - Examples: examples/README_EXAMPLES.md
    - Configuration: config/README_CONFIG.md
    - Scripts: scripts/README_SCRIPTS.md
    
  - Planning:
    - Roadmap: docs/planning/_ALBERATURA_FRAMEWORK_DA-IMPLEMENTARE_FEB12_2026.md
    - Refactoring Plan: docs/architecture/SACRED_ORDERS_REFACTORING_PLAN.md

