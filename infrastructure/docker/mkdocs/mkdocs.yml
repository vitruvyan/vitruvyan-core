# ============================================================================
# MkDocs Configuration — Vitruvyan Core Knowledge Base
# ============================================================================
# Last Updated: February 12, 2026
# Purpose: User & administrator documentation (domain-agnostic epistemic OS)
# Deploy: docker compose up -d mkdocs → http://localhost:9800
# Build:  mkdocs build → site/ (static HTML)
# ============================================================================

site_name: Vitruvyan OS
site_description: Domain-agnostic epistemic operating system
site_author: Vitruvyan Team
site_url: https://kb.vitruvyan.com/admin/

# Docs directory (symlinked docs root)
docs_dir: /app/docs_root
site_dir: /app/site

# Theme configuration
theme:
  name: simple-blog
  language: en
  sidebar: true
  navigation_depth: 3
  
# Plugins
plugins:
  - i18n:
      fallback_to_default: true
      docs_structure: suffix
      languages:
        - locale: en
          name: English
          default: true
          build: true
          link: /admin/
        - locale: it
          name: Italiano
          build: true
          link: /it/admin/
  - search:
      lang:
        - en
        - it
  # git-revision-date-localized disabled (requires git repo in mounted volumes)
  # - git-revision-date-localized:
  #     enable_creation_date: true
  #     type: timeago
  - mermaid2
  - minify:
      # NOTE: keep Mermaid diagram source newlines intact.
      # htmlmin tends to collapse whitespace inside <div class="mermaid">,
      # which breaks Mermaid parsing ("Syntax error in text").
      minify_html: false

# Markdown extensions
markdown_extensions:
  - admonition              # Callouts (notes, warnings, etc.)
  - pymdownx.details        # Collapsible admonitions
  - pymdownx.superfences:   # Code blocks, Mermaid (via mermaid2 post-processing)
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.tabbed:        # Content tabs
      alternate_style: true
  - pymdownx.highlight:     # Syntax highlighting
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite   # Inline code highlighting
  - pymdownx.snippets       # Include external files
  - pymdownx.tasklist:      # Task lists
      custom_checkbox: true
  - tables                  # Tables support
  - footnotes               # Footnotes
  - attr_list               # Add attributes to elements
  - md_in_html              # Markdown in HTML
  - toc:                    # Table of contents
      permalink: true
      toc_depth: 3

