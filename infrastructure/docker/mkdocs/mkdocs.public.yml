# ============================================================================
# MkDocs Configuration — PUBLIC LANDING PAGE (No Authentication)
# ============================================================================
# Last Updated: February 12, 2026
# Purpose: Single landing page explaining Vitruvyan + access request instructions
# Deploy: docker compose exec mkdocs mkdocs build -f mkdocs.public.yml -d site_public
# Access: https://kb.vitruvyan.com/ (root path, no authentication)
# ============================================================================

site_name: Vitruvyan Core
site_description: Domain-agnostic epistemic operating system — Request knowledge base access
site_author: Vitruvyan Team
site_url: https://kb.vitruvyan.com

repo_name: vitruvyan-core
repo_url: https://github.com/vitruvyan/vitruvyan-core

# Docs directory (dedicated public directory with landing page only)
docs_dir: /app/docs_root_public
site_dir: /app/site_public

# Theme configuration (minimal)
theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
  features:
    - navigation.instant
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

# Plugins (minimal)
plugins:
  - search:
      lang: en

# Markdown extensions (minimal)
markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true

# Site navigation (SINGLE PAGE ONLY)
nav:
  - Home: index.md

# Footer
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vitruvyan/vitruvyan-core
      name: GitHub Repository

# Copyright
copyright: Copyright &copy; 2026 Vitruvyan Team
