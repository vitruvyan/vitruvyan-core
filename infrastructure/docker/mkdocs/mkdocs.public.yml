# ============================================================================
# MkDocs Configuration — PUBLIC LANDING PAGE (No Authentication)
# ============================================================================
# Last Updated: February 12, 2026
# Purpose: Single landing page explaining Vitruvyan + access request instructions
# Deploy: docker compose exec mkdocs mkdocs build -f mkdocs.public.yml -d site_public
# Access: https://kb.vitruvyan.com/ (root path, no authentication)
# ============================================================================

site_name: Vitruvyan OS
site_description: Domain-agnostic epistemic operating system — Request knowledge base access
site_author: Vitruvyan Team
site_url: https://kb.vitruvyan.com

# Docs directory (dedicated public directory with landing page only)
docs_dir: /app/docs_root_public
site_dir: /app/site_public

# Theme configuration (minimal)
theme:
  name: material
  logo: assets/kb/vitruvyan-logo-white.png
  language: en
  font:
    text: Inconsolata
    code: Inconsolata
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: black
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight

# Plugins (minimal)
plugins:
  - i18n:
      fallback_to_default: true
      docs_structure: suffix
      languages:
        - locale: en
          name: English
          default: true
          build: true
          link: /
        - locale: it
          name: Italiano
          build: true
          link: /it/

# Markdown extensions (minimal)
markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: false

# Site navigation (SINGLE PAGE ONLY)
nav:
  - Home: index.md

extra_css:
  - assets/kb/material_v1.css?v=20260226a

extra_javascript:
  - assets/kb/vitruvyan.js?v=20260226a

