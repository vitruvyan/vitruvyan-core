[pytest]
# Vitruvyan Core — Test Configuration
# =====================================
# Tests are organized by type:
#   tests/unit/       — Pure function/class tests (no I/O, no Docker)
#   tests/integration/ — Cross-module tests (may need Redis/Postgres stubs)
#   tests/architectural/ — Static analysis and contract enforcement
#   tests/e2e/        — End-to-end pipeline tests (need full stack)

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Pure unit tests — no I/O, no network, no Docker
    integration: Cross-module tests — may use mocked services
    architectural: Static analysis and structural contracts
    e2e: End-to-end tests — require running services
    slow: Tests that take > 5 seconds
    algorithms: VPAR algorithm tests (VEE, VARE, VSGS, VWRE)
    agents: Agent tests (LLMAgent, PostgresAgent, QdrantAgent)
    orchestration: LangGraph, IntentRegistry, PromptRegistry
    llm: LLM-related tests
    sacred_orders: Sacred Order tests (Orthodoxy, Vault, Memory, etc.)
    compatibility: Update Manager compatibility tests (CI gates)

# Console output
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

# Default: run only unit tests (fast, no Docker needed)
# Usage:
#   pytest                        — run unit tests
#   pytest -m integration         — run integration tests
#   pytest -m "not e2e"           — run everything except e2e
#   pytest -m algorithms          — run only algorithm tests
#   pytest tests/unit/algorithms/ — run algorithm unit tests

# Logging
log_cli = false
log_cli_level = WARNING

# Timeout per test (seconds)
# timeout = 30
